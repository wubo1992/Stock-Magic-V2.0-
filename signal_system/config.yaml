# ============================================================
# config.yaml — 事件驱动 SEPA 交易信号系统 · 全局参数
# 修改这个文件来调整系统行为，不需要改任何 Python 代码
# ============================================================

# ------------------------------------------------------------
# 股票池
# ------------------------------------------------------------
# 手动股票池：见 UNIVERSE.md（唯一来源，代码直接读取该文件）
# 在 UNIVERSE.md 中增删股票，下次运行自动生效，无需改此处。

# 自动股票池：Alpaca 新闻 API，每次运行增量更新
auto_universe:
  source: alpaca
  initial_lookback_days: 365   # 首次运行时，回抓多少天的新闻
  max_age_days: 365             # 超过此天数未被提及，自动移出股票池
  include_indices:
    - sp500
    - nasdaq100

# 合并规则：最终股票池 = UNIVERSE.md ∪ 指数成分股 ∪ Alpaca 自动池（自动去重）

# ------------------------------------------------------------
# 数据获取
# ------------------------------------------------------------
data:
  timeframe: "1d"          # K线周期：1d = 日线
  history_days: 3652       # 拉取多少天历史数据（约10年，覆盖多个完整牛熊周期）

# ── 默认策略（--strategy 未指定时使用）─────────────────────
active_strategy: v1_plus

# ── 策略参数（每个策略独立命名空间）──────────────────────────
strategies:
  v1:
    name: 魔法师策略V1
    description: "SEPA + VCP，基于 Minervini《股票魔法师》"

    # 趋势模板：8个条件
    sma_short: 50            # 短期均线天数
    sma_mid: 150             # 中期均线天数
    sma_long: 200            # 长期均线天数
    trend_lookback: 20       # 判断200日均线本身在上升，回看多少天

    low_52w_mult: 1.25       # 收盘价必须 >= 52周低点 × 这个倍数（至少涨了25%）
    high_52w_mult: 0.75      # 收盘价必须 >= 52周高点 × 这个比例（距高点不超过25%）

    rs_min_percentile: 70    # 相对强度排名：只选涨幅在前30%的股票（即排名>=70%）

    # 突破条件
    pivot_lookback: 30       # 回看多少天来确定"枢轴点"（平台顶部）
    min_breakout_pct: 0.005  # 突破幅度至少 0.5%（避免微小假突破）
    volume_mult: 1.5         # 当日成交量必须 >= 20日均量 × 这个倍数

    # VCP 形态识别
    vcp_lookback: 50         # 回看多少天来检测VCP底部形态（约2个月）
    vcp_min_contractions: 2  # 最少需要几次收缩（Minervini 常见2-4次）
    vcp_final_range_pct: 0.08 # 末端收缩箱体不超过股价的8%

    # 出场条件
    stop_loss_pct: 0.10      # 固定止损：跌破入场价10%就出场
    trailing_stop_pct: 0.20  # 追踪止盈：从持仓最高点回落20%就出场
    time_stop_days: 20       # 时间止损：持仓超过这么多天
    time_stop_min_gain: 0.03 # 时间止损：若盈利不足3%，则出场（避免资金被套住）

  # ── 魔法师调整参数版V1+ ─────────────────────────────────────
  # 基于 v1，用于参数调优实验（控制变量法）
  # 每次只改一个参数，比较结果后选最优组合
  v1_plus:
    name: 魔法师调整参数版V1+
    description: "V1 参数调优版，当前测试参数见下方注释"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 70    # 测试A：改为 60（放宽到前40%）；基准：70
    pivot_lookback: 30
    min_breakout_pct: 0.005  # 测试C：改为 0.003（放宽到0.3%）；基准：0.005
    volume_mult: 1.5         # 测试B：改为 1.3（降低成交量要求）；基准：1.5

    vcp_lookback: 50
    vcp_min_contractions: 2  # 不改
    vcp_final_range_pct: 0.12  # 测试D：放宽到12%（已采用）；基准：0.08

    stop_loss_pct: 0.10
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

  # ── O'Neil CANSLIM 技术版 ────────────────────────────────────
  # 宽松 VCP（允许更深整理，近似 O'Neil 的"杯柄形态"），RS≥80，止损 7%
  v_oneil:
    name: O'Neil CANSLIM 技术版
    description: "宽松 VCP 近似杯柄形态，RS Top 20%，7% 止损。注：无 EPS/ROE 基本面筛选"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 80        # IBD 风格 RS≥80（Top 20%）
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5

    vcp_lookback: 60             # 稍长，检测更宽的杯形
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.20    # 宽松（O'Neil 杯底可达 33%，用 20% 近似）

    stop_loss_pct: 0.08          # O'Neil 经典 7% 止损
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

  # ── David Ryan 精简 CANSLIM ──────────────────────────────────
  # 极紧 VCP，强调整理"形态紧密性"，RS≥80，追踪止损更紧（15%）
  v_ryan:
    name: Ryan 精简 CANSLIM
    description: "极紧 VCP（5%），RS Top 20%，8% 止损。注：无小市值过滤（缺少市值数据）"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 80
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 2.0             # 整理期量能需更明显萎缩才算"紧密"

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.05    # 极紧（vs v1_plus 的 0.12）

    stop_loss_pct: 0.08
    trailing_stop_pct: 0.15      # Ryan 从高点回落 15% 出场
    time_stop_days: 20
    time_stop_min_gain: 0.03

  # ── Oliver Kell VCP 2.0 ────────────────────────────────────
  # 放量要求极严（3x），突破幅度更高，RS≥80
  v_kell:
    name: Kell VCP 2.0
    description: "高量能门槛（3x），突破≥1.5%，RS Top 20%。注：无 EPS≥50% 基本面筛选"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 80
    pivot_lookback: 30
    min_breakout_pct: 0.015      # 突破幅度至少 1.5%（vs v1_plus 的 0.5%）
    volume_mult: 3.0             # 突破量至少 3 倍（vs v1_plus 的 1.5x）

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.10

    stop_loss_pct: 0.08
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

  # ── Kullamägi VCP 变种 ──────────────────────────────────────
  # 极紧止损（5%），极端放量要求（4x），快速时间止损
  # ⚠️ 注：Episodic Pivot 入场未实现（需要财报超预期数据）
  v_kullamaggi:
    name: Kullamägi VCP 变种
    description: "止损 5%（最紧），放量 4x（极端），⚠️ Episodic Pivot 未实现"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 75
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 4.0             # 极端放量要求（vs 1.5x）

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.08

    stop_loss_pct: 0.05          # 极紧止损 5%（vs 10%）
    trailing_stop_pct: 0.12      # 从高点回落 12% 出场
    time_stop_days: 15           # 更短时间止损
    time_stop_min_gain: 0.02

  # ── Zanger 纯技术动量 ─────────────────────────────────────
  # 无 RS 过滤，无 VCP，只要 SMA150 上升 + 高量突破（3x）
  v_zanger:
    name: Zanger 纯技术动量
    description: "无 RS/VCP，纯技术高量突破，3x 放量，6% 止损，10 天时间止损"

    sma_long: 150                # 核心工具：150 日均线
    trend_lookback: 20           # SMA150 需上升至少 20 天
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 3.0             # 放量至少 3 倍

    stop_loss_pct: 0.08
    trailing_stop_pct: 0.15
    time_stop_days: 10           # Zanger 更短的时间止损（不持有不动的股票）
    time_stop_min_gain: 0.02

  # ── Stine 超强精选（无内部人数据版）────────────────────────
  # RS 门槛最高（Top 10%），极紧 VCP，高量
  # ⚠️ 注：内部人士买入（SEC Form 4）条件缺失，缺少此核心过滤器
  v_stine:
    name: Stine 超强精选（无内部人数据版）
    description: "RS Top 10%，极紧 VCP（5%），放量 3x，⚠️ 内部人买入条件缺失"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75          # 距 52 周高点不超过 25%（已在高位区）

    rs_min_percentile: 90        # Top 10%（vs v1_plus 的 70%）
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 3.0

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.05    # 极紧

    stop_loss_pct: 0.08
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

  # ── Weinstein Stage 2 阶段分析 ──────────────────────────────
  # 只用 SMA150，无 VCP，无 RS，Stage 2 突破入场，中长期持有
  v_weinstein:
    name: Weinstein Stage 2 分析
    description: "SMA150 上升 + 价格突破整理区，无 VCP，无 RS，长周期策略"

    sma_long: 150                # 核心工具：30 周均线（≈150 日）
    trend_lookback: 30           # SMA150 需上升至少 30 天（Stage 2 确认）
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5

    stop_loss_pct: 0.10
    trailing_stop_pct: 0.20
    time_stop_days: 30           # 中长期策略，给更多时间
    time_stop_min_gain: 0.05     # 持有 30 天仍不到 5% 才离场

  v_weinstein_adx:
    name: Weinstein Stage 2 + ADX 增强
    description: "Weinstein Stage 2 + ADX(14)>35 + RSI<80 趋势确认"

    sma_long: 150
    trend_lookback: 30
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5
    rsi_max: 80
    adx_threshold: 30
    market_filter: false

    stop_loss_pct: 0.08
    trailing_stop_pct: 0.20
    time_stop_days: 30
    time_stop_min_gain: 0.05

  # ── EPS 基本面因子策略 ────────────────────────────────
  # SEPA 技术分析 + EPS 增长筛选（Alpha Vantage 数据源）
  v_eps:
    name: EPS 基本面策略
    description: "SEPA + VCP + EPS 增长筛选（3季度同比+环比增长），Alpha Vantage 数据"

    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 70
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.12

    stop_loss_pct: 0.10
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

    # EPS 基本面参数
    eps_quarters_required: 3     # 需要几个季度 EPS 数据
    eps_yoy_required: true       # 同比是否必须增长
    eps_qoq_required: true       # 环比是否必须增长

  # ── Weinstein Stage 2 + EPS 基本面策略 ──────────────────────────
  # 以 Weinstein Stage 2 为技术框架，通过后再加 EPS 增长筛选
  v_eps_v2:
    name: "Weinstein + EPS"
    description: "Weinstein Stage 2 技术框架 + EPS 增长筛选（3季度同比+环比增长）"

    # Weinstein Stage 2 技术参数
    sma_long: 150                # 核心工具：30 周均线（≈150 日）
    trend_lookback: 30           # SMA150 需上升至少 30 天（Stage 2 确认）
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5

    stop_loss_pct: 0.10
    trailing_stop_pct: 0.20
    time_stop_days: 30           # 中长期策略，给更多时间
    time_stop_min_gain: 0.05

    # EPS 基本面参数
    eps_quarters_required: 3     # 需要几个季度 EPS 数据
    eps_yoy_required: true       # 同比是否必须增长
    eps_qoq_required: true       # 环比是否必须增长

  # ── EPS V1 Plus ──────────────────────────────────────────────
  # 以 v1_plus（SEPA+VCP，vcp=0.12）为技术框架，通过后再加 EPS 增长筛选
  v_eps_v1_plus:
    name: EPS V1 Plus
    description: "v1_plus 技术框架 + EPS 增长筛选（3季度同比+环比增长）"

    # v1_plus 技术参数（vcp_final_range_pct=0.12）
    sma_short: 50
    sma_mid: 150
    sma_long: 200
    trend_lookback: 20
    low_52w_mult: 1.25
    high_52w_mult: 0.75

    rs_min_percentile: 70
    pivot_lookback: 30
    min_breakout_pct: 0.005
    volume_mult: 1.5

    vcp_lookback: 50
    vcp_min_contractions: 2
    vcp_final_range_pct: 0.12   # v1_plus 的宽松 VCP

    stop_loss_pct: 0.10
    trailing_stop_pct: 0.20
    time_stop_days: 20
    time_stop_min_gain: 0.03

    # EPS 基本面参数
    eps_quarters_required: 3     # 需要几个季度 EPS 数据
    eps_yoy_required: true       # 同比是否必须增长
    eps_qoq_required: true       # 环比是否必须增长

  # ── ADX50 动量突破策略 ─────────────────────────────────────
  # 50日最高价突破 + ADX(14)>25 趋势确认 + RS 相对强度过滤
  v_adx50:
    name: ADX50 动量突破策略
    high_lookback: 50
    adx_period: 14
    adx_threshold: 25
    stop_loss_pct: 0.10
    take_profit_pct: 0.20
    rs_min_percentile: 70

# ------------------------------------------------------------
# 输出设置
# ------------------------------------------------------------
output:
  print_to_console: true   # 是否把信号打印到终端
  save_to_csv: true        # 是否把信号保存到 output/{strategy_id}/signals.csv

# ------------------------------------------------------------
# 股票池扫描（--mode scan）
# ------------------------------------------------------------
scan:
  sa_quant_min: 4.5          # SA Quant Rating 最低分（4.5-5.0 = Strong Buy）
  min_market_cap_b: 1.0      # 最小市值（十亿美元），过滤微型股
  max_new_per_run: 30        # 每次扫描最多新增几只（防止一次加太多）
  request_delay_seconds: 1.2 # 每次 SA API 请求之间的间隔（秒），避免被限速

  # 额外候选池：Alpaca 自动池之外，额外指定要检查的股票
  # 这里放大市值标普成分股等 SA 一定会覆盖的股票
  extra_candidates:
    # 标普500 大市值科技
    - ADBE    # Adobe
    - CRM     # Salesforce（已在手动池，会自动跳过）
    - SNOW    # Snowflake
    - PANW    # Palo Alto Networks
    - CRWD    # CrowdStrike（已在手动池）
    - ZS      # Zscaler
    - NOW     # ServiceNow
    - DDOG    # Datadog
    - MDB     # MongoDB
    - NET     # Cloudflare
    - SHOP    # Shopify
    - MELI    # MercadoLibre
    - SE      # Sea Limited
    - TTD     # The Trade Desk
    - RBLX    # Roblox
    - COIN    # Coinbase
    - HOOD    # Robinhood
    - SOFI    # SoFi Technologies
    # 标普500 金融
    - BLK     # BlackRock
    - SCHW    # Charles Schwab
    - CME     # CME Group
    - ICE     # Intercontinental Exchange
    - MSCI    # MSCI
    # 标普500 医疗器械/创新
    - SYK     # Stryker
    - BSX     # Boston Scientific
    - EW      # Edwards Lifesciences
    - DXCM    # Dexcom
    - GEHC    # GE HealthCare
    # 标普500 工业/航空
    - LMT     # Lockheed Martin
